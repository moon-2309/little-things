<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Little Things 🌙</title>

<style>

/* 🌌 FORCE DARK BACKGROUND */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: #0b0f2a; /* fallback */
}

/* 🌌 Night sky gradient */
body {
  background: radial-gradient(circle at top, #1b1f4a 0%, #0b0f2a 60%, #050814 100%);
  position: relative;
}

/* 🌙 MOON */
.moon {
  position: absolute;
  top: 60px;
  right: 80px;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, #fff 40%, #e6e6ff 70%);
  border-radius: 50%;
  box-shadow: 
    0 0 30px rgba(255,255,255,0.6),
    0 0 60px rgba(180,180,255,0.4);
}

/* ✨ stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1.4); }
}

/* 🌸 CHARACTER */
.character {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5; /* 👈 ensures she stays clear */
}

.head {
  width: 70px;
  height: 70px;
  background: #f5c6b4;
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 20px rgba(150,150,255,0.3);
}

/* 💇‍♀️ shoulder-length hair */
.hair {
  position: absolute;
  width: 90px;
  height: 95px;
  background: linear-gradient(#1a1a3a, #3a2f8f);
  border-radius: 50% 50% 40% 40%;
  top: -15px;
  left: -10px;
  z-index: -1;
}

/* ✨ side strands */
.hair::before,
.hair::after {
  content: "";
  position: absolute;
  width: 25px;
  height: 50px;
  background: inherit;
  top: 45px;
  border-radius: 50%;
}

.hair::before {
  left: -10px;
}

.hair::after {
  right: -10px;
}

/* ✨ sparkly eyes */
/* ✨ sparkly eyes (fixed) */
.eye {
  width: 12px;
  height: 12px;
  position: absolute;
  top: 30px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff 5%, #a29bfe 35%, #6c5ce7 100%);
  box-shadow: 0 0 6px rgba(162,155,254,0.8);
}

/* left & right positions (important fix) */
.eye.left { left: 18px; }
.eye.right { right: 18px; }

/* ✨ sparkle highlight */
.eye::after {
  content: "";
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 3px;
}

/* 👀 blinking animation */
@keyframes blink {
  0%, 90%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

.eye {
  animation: blink 4s infinite;
  transform-origin: center;
}

/* 😊 cute smile */
.mouth {
  width: 16px;
  height: 8px;
  border-bottom: 3px solid #873030;
  border-radius: 0 0 20px 20px;
  position: absolute;
  top: 48px;
  left: 50%;
  transform: translateX(-50%);
}

/* tiny happy curve boost */
.mouth::after {
  content: "";
  position: absolute;
  width: 16px;
  height: 8px;
  border-bottom: 2px solid rgba(90, 61, 43, 0.4);
  border-radius: 0 0 20px 20px;
  top: 1px;
  left: 0;
}

/* 🌸 blush */
.blush {
  position: absolute;
  width: 10px;
  height: 6px;
  background: rgba(255, 150, 180, 0.6);
  border-radius: 50%;
  top: 42px;
  filter: blur(1px);
}

.blush.left { left: 12px; }
.blush.right { right: 12px; }

/* 🌸 soft eyebrows */
.eyebrow {
  position: absolute;
  width: 14px;
  height: 6px;
  border-top: 2px solid #3a2f8f;
  border-radius: 50%;
  top: 22px;
  opacity: 0.7;
}

/* positions */
.eyebrow.left {
  left: 16px;
  transform: rotate(-10deg);
}

.eyebrow.right {
  right: 16px;
  transform: rotate(10deg);
}

.body {
  width: 40px;
  height: 30px;
  background: #6c7ae0;
  border-radius: 10px;
  margin: 0 auto;
  margin-top: -10px;
}

/* 💎 falling diamonds */
.item {
  position: absolute;
  top: 0;
  width: 14px;
  height: 14px;
  background: white;
  transform: rotate(45deg);
  box-shadow: 0 0 10px white, 0 0 20px rgba(180,180,255,0.8);
  animation: fall linear;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(45deg);
  }
}

/* 🌫️ message */
.message {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  color: white;
  font-size: 15px;
  opacity: 0;
  filter: blur(6px);
  transition: all 0.8s ease;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.message.show {
  opacity: 1;
  filter: blur(0);
  transform: translateX(-50%) scale(1);
}

/* 🌫️ bottom fog */
/* ☁️ dreamy cloud fog */
.fog {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 140px;

  pointer-events: none;
  z-index: 1;

  /* ✨ layered cloud blobs */
  background:
    radial-gradient(circle at 20% 80%, rgba(220,230,255,0.35) 0%, transparent 60%),
    radial-gradient(circle at 50% 100%, rgba(200,210,255,0.3) 0%, transparent 65%),
    radial-gradient(circle at 80% 85%, rgba(220,230,255,0.35) 0%, transparent 60%),
    linear-gradient(to top, rgba(180,190,255,0.25), transparent);

  filter: blur(10px);
  opacity: 0.9;
}

.fog {
  box-shadow: 0 -10px 40px rgba(180, 180, 255, 0.2);
}

@keyframes drift {
  from { transform: translateX(0); }
  to { transform: translateX(-40px); }
}

.fog {
  animation: drift 20s linear infinite;
}

.star { z-index: 0; }
.item { z-index: 2; }
</style>
</head>

<body>

<!-- 🌙 moon -->
<div class="moon"></div>

<!-- ✨ stars -->
<script>
for (let i = 0; i < 100; i++) {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.top = Math.random() * window.innerHeight + "px";
  star.style.animationDuration = (1 + Math.random() * 2) + "s";
  document.body.appendChild(star);
}
</script>

<!-- 🌸 character -->
<div class="character">
  <div class="head">
    <div class="hair"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
    <div class="blush left"></div>
<div class="blush right"></div>
<div class="eyebrow left"></div>
<div class="eyebrow right"></div>
  </div>
  <div class="body"></div>
</div>

<div class="message" id="messageBox"></div>

<script>
let x = window.innerWidth / 2;
const character = document.querySelector(".character");
const messageBox = document.getElementById("messageBox");

const messages = {
  "star": "You made it through the night 🌙",
  "shine": "Even tiny lights matter ✨",
  "dream": "You are closer than you think 💫",
  "hope": "Soft hope still exists 🌌"
};

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") x -= 25;
  if (e.key === "ArrowRight") x += 25;

  x = Math.max(0, Math.min(window.innerWidth - 80, x));
  character.style.left = x + "px";
});

function createItem() {
  const item = document.createElement("div");
  item.classList.add("item");

  const types = ["star", "shine", "dream", "hope"];
  const type = types[Math.floor(Math.random() * types.length)];

  item.dataset.type = type;
  item.style.left = Math.random() * window.innerWidth + "px";
  item.style.animationDuration = (7 + Math.random() * 3) + "s";

  document.body.appendChild(item);

  const checkCollision = setInterval(() => {
    const itemRect = item.getBoundingClientRect();
    const charRect = character.getBoundingClientRect();

    if (
      itemRect.bottom >= charRect.top &&
      itemRect.left < charRect.right &&
      itemRect.right > charRect.left
    ) {
      showMessage(messages[type]);
      item.remove();
      clearInterval(checkCollision);
    }
  }, 50);

  setTimeout(() => {
    item.remove();
    clearInterval(checkCollision);
  }, 10000);
}

function showMessage(text) {
  messageBox.innerText = text;
  messageBox.classList.add("show");

  setTimeout(() => {
    messageBox.classList.remove("show");
  }, 3000);
}

setInterval(createItem, 2000);
</script>
<div class="fog"></div>
</body>
</html>
